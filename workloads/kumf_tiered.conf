# KUMF Tiered Workload 配置
# 热数据 (coordinates/forces) → Node 0 (快层, 同 socket)
# 冷数据 (masses/topology)    → Node 2 (慢层, 跨 socket)
#
# 用法: KUMF_CONF=kumf_tiered.conf LD_PRELOAD=../src/lib/interc/ldlib.so ./kumf_tiered
#
# interc 匹配规则：
#   - 函数名模式匹配 (通配符 *)
#   - 地址范围匹配 (0xSTART-0xEND = NODE)

# 热数据: 大块分配 (200MB+) 路由到快层
# 按大小路由：>100MB 的 malloc → Node 0
# 注意：interc 当前按函数名或地址匹配，按大小路由需要修改 interc 代码
# 临时方案：用 main 函数地址范围匹配所有分配

# ===== 方案 1: 按大小阈值 (需要 interc 支持) =====
# size > 104857600 = 0     # >100MB → 快层 (hot)

# ===== 方案 2: 按调用顺序 =====
# 前两个 malloc 是 coordinates 和 forces → 快层
# 后续 malloc 是 masses 和 topology → 慢层

# ===== 方案 3: 默认路由 =====
# 所有 >4KB 的分配默认路由到 Node 0 (快层)
# 这是 interc 的默认行为

# 暂时用默认配置：所有大块分配路由到 Node 0
# 后续通过 SPE 分析结果自动生成精确配置
