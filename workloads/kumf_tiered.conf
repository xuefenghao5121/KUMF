# KUMF SOAR Config for kumf_tiered
# 
# kumf_tiered 的冷热分离：
#   热: coordinates(200MB), forces(200MB), rand_idx(200MB) — 每步全量访问
#   冷: masses(100MB) — 只读顺序访问
#   忽略: topology(80B) — 太小不值得路由
#
# 路由策略：
#   > 150MB → Node 0 (快层，热数据)
#   50MB-150MB → Node 2 (慢层，冷数据)
#   < 50MB → 不路由 (默认 first-touch)

# 热数据: >150MB → Node 0
size_gt:157286400 = 0

# 冷数据: 50MB-150MB → Node 2
size_range:52428800-157286400 = 2

# 小分配: 不路由 (没有规则就走到默认 malloc)
